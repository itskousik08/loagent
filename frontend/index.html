<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loagent - Professional AI Agent</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>
    <style>
        body { background-color: #0d1117; color: #c9d1d9; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .code-block { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 16px; margin-top: 10px; overflow-x: auto;}
        .thought-box { border-left: 3px solid #8b949e; background: #161b22; padding: 10px; font-size: 0.9em; color: #8b949e; margin-bottom: 10px;}
    </style>
</head>
<body class="h-screen flex flex-col font-sans overflow-hidden">

    <!-- Header -->
    <header class="bg-[#161b22] border-b border-[#30363d] p-3 md:p-4 flex justify-between items-center z-10">
        <div class="flex items-center gap-2 md:gap-3">
            <div class="bg-blue-600 w-8 h-8 rounded flex items-center justify-center font-bold text-white shadow-[0_0_10px_rgba(37,99,235,0.5)]">L</div>
            <h1 class="text-lg md:text-xl font-semibold text-white tracking-wide">Loagent</h1>
        </div>
        <div class="flex items-center gap-2 md:gap-4">
            <!-- Dynamic Model Select -->
            <select id="model-select" class="bg-[#0d1117] border border-[#30363d] text-xs md:text-sm rounded px-2 md:px-3 py-1.5 focus:outline-none focus:border-blue-500 max-w-[120px] md:max-w-xs truncate">
                <option value="">Loading models...</option>
            </select>
        </div>
    </header>

    <!-- Main Workspace (Responsive: Stack on mobile, split on PC) -->
    <main class="flex flex-col md:flex-row flex-1 overflow-hidden">
        
        <!-- Left Panel: Chat -->
        <div class="w-full md:w-1/2 flex flex-col border-b md:border-b-0 md:border-r border-[#30363d] h-1/2 md:h-full">
            <div id="chat-history" class="flex-1 overflow-y-auto p-4 md:p-6 space-y-6 scrollbar-hide">
                <div class="flex gap-4">
                    <div class="w-8 h-8 rounded-full bg-blue-600 flex items-center justify-center shrink-0"><i class="fa-solid fa-robot text-xs text-white"></i></div>
                    <div>
                        <p class="font-semibold text-gray-200 mb-1">Loagent</p>
                        <div class="text-gray-300 leading-relaxed text-sm">Hello! I am connected to your local Ollama. Tell me what to build.</div>
                    </div>
                </div>
            </div>
            <div class="p-3 md:p-4 bg-[#161b22] border-t border-[#30363d]">
                <div class="relative flex items-center bg-[#0d1117] border border-[#30363d] rounded-lg p-1">
                    <textarea id="user-input" rows="1" class="w-full bg-transparent text-gray-200 px-3 py-2 focus:outline-none resize-none text-sm scrollbar-hide" placeholder="Message Loagent..."></textarea>
                    <button id="send-btn" class="bg-blue-600 text-white p-2 rounded hover:bg-blue-700 transition mr-1 w-8 h-8 flex items-center justify-center shrink-0" onclick="sendMessage()">
                        <i class="fa-solid fa-paper-plane text-xs"></i>
                    </button>
                </div>
            </div>
        </div>

        <!-- Right Panel: Workspace -->
        <div class="w-full md:w-1/2 flex flex-col h-1/2 md:h-full bg-[#0d1117]">
            <div class="flex border-b border-[#30363d] bg-[#161b22] px-4">
                <button class="px-4 py-2 text-sm font-medium border-b-2 border-blue-500 text-blue-400">Workspace</button>
            </div>
            <div id="workspace" class="flex-1 overflow-y-auto p-4 md:p-6 scrollbar-hide relative">
                <div class="absolute inset-0 flex flex-col items-center justify-center text-gray-600">
                    <i class="fa-solid fa-code text-4xl mb-3"></i>
                    <p class="text-sm">Generated code will appear here</p>
                </div>
            </div>
        </div>
    </main>

    <!-- GitHub Professional Modal (Hidden by default) -->
    <div id="github-modal" class="fixed inset-0 bg-black bg-opacity-70 hidden flex items-center justify-center z-50 px-4">
        <div class="bg-[#161b22] border border-[#30363d] rounded-lg p-6 w-full max-w-md shadow-2xl">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-lg font-bold text-white"><i class="fa-brands fa-github mr-2"></i>Deploy to GitHub</h2>
                <button onclick="closeGithubModal()" class="text-gray-400 hover:text-white"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="space-y-4">
                <div>
                    <label class="block text-xs text-gray-400 mb-1">GitHub PAT (Token)</label>
                    <input type="password" id="gh-token" class="w-full bg-[#0d1117] border border-[#30363d] text-white px-3 py-2 rounded text-sm focus:border-blue-500 outline-none" placeholder="ghp_xxxxxxxxxxxx">
                </div>
                <div>
                    <label class="block text-xs text-gray-400 mb-1">Repository Name</label>
                    <input type="text" id="gh-repo" class="w-full bg-[#0d1117] border border-[#30363d] text-white px-3 py-2 rounded text-sm focus:border-blue-500 outline-none" placeholder="username/repo-name">
                </div>
                <div>
                    <label class="block text-xs text-gray-400 mb-1">File Path (e.g. main.py or index.html)</label>
                    <input type="text" id="gh-filepath" class="w-full bg-[#0d1117] border border-[#30363d] text-white px-3 py-2 rounded text-sm focus:border-blue-500 outline-none" placeholder="src/app.js">
                </div>
                <button onclick="pushCodeToGithub()" class="w-full bg-green-600 hover:bg-green-700 text-white font-semibold py-2 rounded text-sm transition mt-2">
                    <i class="fa-solid fa-cloud-arrow-up mr-2"></i> Push Code
                </button>
                <p id="gh-status" class="text-xs text-center mt-2 hidden"></p>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
